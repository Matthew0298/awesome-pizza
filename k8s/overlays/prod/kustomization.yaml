apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: awesome-pizza-prod
nameSuffix: -prod

images:
  - name: awesome-pizza
    newName: ghcr.io/your-org/awesome-pizza
    newTag: prod-latest

patches:
  - path: patch-deployment.yaml
  - path: patch-configmap.yaml
