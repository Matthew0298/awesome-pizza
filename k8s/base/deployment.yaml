apiVersion: apps/v1
kind: Deployment
metadata:
  name: awesome-pizza
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awesome-pizza
  template:
    metadata:
      labels:
        app: awesome-pizza
    spec:
      containers:
        - name: awesome-pizza
          image: awesome-pizza:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: awesome-pizza-config
          readinessProbe:
            httpGet:
              path: /api/v1/orders
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/orders
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
